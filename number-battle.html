<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数字猜猜猜 · 双人对战</title>
  <style>
    :root {
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --card2: #16213e;
      --accent1: #e94560;
      --accent2: #0f3460;
      --accent3: #533483;
      --gold: #f5a623;
      --text: #e0e0e0;
      --muted: #888;
      --green: #4caf50;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'PingFang SC', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    h1 {
      font-size: 2rem;
      background: linear-gradient(90deg, var(--accent1), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
      letter-spacing: 2px;
    }
    .subtitle { color: var(--muted); font-size: .9rem; margin-bottom: 28px; }

    /* ---- Phase Indicator ---- */
    .phase-bar {
      display: flex; gap: 10px; margin-bottom: 28px;
      flex-wrap: wrap; justify-content: center;
    }
    .phase-step {
      padding: 6px 18px; border-radius: 20px;
      font-size: .82rem; background: var(--card2);
      color: var(--muted); border: 1px solid transparent;
      transition: all .3s;
    }
    .phase-step.active {
      background: var(--accent1); color: #fff;
      border-color: var(--accent1);
      box-shadow: 0 0 12px #e9456060;
    }
    .phase-step.done {
      background: var(--card2); color: var(--green);
      border-color: var(--green);
    }

    /* ---- Card ---- */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px 32px;
      width: 100%; max-width: 560px;
      box-shadow: 0 8px 40px #0008;
      border: 1px solid #ffffff0d;
      margin-bottom: 20px;
    }
    .card h2 {
      font-size: 1.15rem; margin-bottom: 18px;
      color: var(--gold);
      display: flex; align-items: center; gap: 8px;
    }

    /* ---- Input ---- */
    .input-group { margin-bottom: 18px; }
    .input-group label {
      display: block; font-size: .85rem;
      color: var(--muted); margin-bottom: 6px;
    }
    .digit-input {
      display: flex; gap: 10px;
    }
    .digit-input input {
      width: 60px; height: 60px;
      text-align: center; font-size: 1.6rem; font-weight: bold;
      background: var(--card2); border: 2px solid #333;
      border-radius: 10px; color: var(--text);
      outline: none; transition: border-color .2s;
      caret-color: var(--accent1);
    }
    .digit-input input:focus { border-color: var(--accent1); }
    .digit-input input.filled { border-color: var(--accent3); }

    /* ---- Button ---- */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px;
      padding: 12px 28px; border-radius: 10px;
      font-size: 1rem; font-weight: 600;
      border: none; cursor: pointer;
      transition: all .2s; user-select: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent1), var(--accent3));
      color: #fff; box-shadow: 0 4px 20px #e9456040;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 28px #e9456060; }
    .btn-secondary {
      background: var(--card2); color: var(--text);
      border: 1px solid #444;
    }
    .btn-secondary:hover { border-color: var(--accent1); color: var(--accent1); }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }
    .btn-gold {
      background: linear-gradient(135deg, var(--gold), #e67e00);
      color: #000; font-weight: 700; box-shadow: 0 4px 20px #f5a62340;
    }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 6px 28px #f5a62360; }

    /* ---- Dice ---- */
    .dice-area {
      display: flex; gap: 32px; justify-content: center;
      align-items: center; margin: 24px 0;
      flex-wrap: wrap;
    }
    .player-dice { text-align: center; }
    .player-dice .name {
      font-size: .9rem; color: var(--muted); margin-bottom: 10px;
    }
    .dice {
      width: 80px; height: 80px; border-radius: 14px;
      background: linear-gradient(135deg, #fff, #e0e0e0);
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      padding: 10px; gap: 4px;
      box-shadow: 0 4px 20px #0005;
      transition: transform .08s;
      cursor: pointer; position: relative; overflow: hidden;
    }
    .dice.rolling {
      animation: shake .6s ease;
    }
    @keyframes shake {
      0%,100%{transform:rotate(0)}
      10%{transform:rotate(-12deg) scale(1.1)}
      30%{transform:rotate(14deg) scale(1.15)}
      50%{transform:rotate(-10deg) scale(1.1)}
      70%{transform:rotate(12deg) scale(1.12)}
      90%{transform:rotate(-6deg) scale(1.05)}
    }
    .dot {
      width: 100%; height: 100%; border-radius: 50%;
      background: #1a1a2e; visibility: hidden;
    }
    .dot.on { visibility: visible; }
    .dice-val {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.4rem; font-weight: 900; color: var(--accent1);
      opacity: 0; transition: opacity .3s;
    }
    .dice-val.show { opacity: 1; }

    .vs-icon { font-size: 2rem; color: var(--accent1); }

    /* ---- Turn Banner ---- */
    .turn-banner {
      text-align: center; padding: 14px;
      border-radius: 10px; margin-bottom: 18px;
      font-size: 1rem; font-weight: 600;
      background: linear-gradient(90deg, var(--accent2), var(--accent3));
      border: 1px solid #ffffff1a;
    }

    /* ---- History ---- */
    .history-wrap { max-height: 280px; overflow-y: auto; padding-right: 4px; }
    .history-wrap::-webkit-scrollbar { width: 4px; }
    .history-wrap::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    .history-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; border-radius: 8px; margin-bottom: 8px;
      background: var(--card2); gap: 10px;
    }
    .history-item .round-num { color: var(--muted); font-size: .8rem; min-width: 30px; }
    .history-item .guesser { font-size: .85rem; font-weight: 600; min-width: 70px; }
    .history-item .guess-num {
      font-size: 1.3rem; font-weight: 900; letter-spacing: 4px;
      color: var(--text);
    }
    .history-item .result {
      font-size: .85rem; text-align: right;
    }
    .hit-num { color: var(--gold); font-weight: 700; font-size: 1rem; }

    /* ---- Player tags ---- */
    .p1-tag { color: #5bc8f5; }
    .p2-tag { color: #f5a05b; }

    /* ---- Split layout ---- */
    .split { display: flex; gap: 16px; flex-wrap: wrap; }
    .split .card { flex: 1; min-width: 240px; }

    /* ---- Win Screen ---- */
    .win-screen {
      text-align: center;
    }
    .win-trophy { font-size: 5rem; margin-bottom: 12px; }
    .win-title {
      font-size: 2rem; font-weight: 900;
      background: linear-gradient(90deg, var(--gold), var(--accent1));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .win-sub { color: var(--muted); margin-bottom: 28px; }
    .reveal-box {
      background: var(--card2); border-radius: 10px;
      padding: 18px; margin-bottom: 24px;
    }
    .reveal-box .label { color: var(--muted); font-size: .85rem; margin-bottom: 8px; }
    .reveal-num {
      font-size: 3rem; font-weight: 900; letter-spacing: 10px;
      color: var(--gold);
    }

    /* ---- Sections ---- */
    .section { display: none; width: 100%; max-width: 720px; flex-direction: column; align-items: center; }
    .section.visible { display: flex; }

    /* ---- Alert ---- */
    .alert {
      padding: 10px 16px; border-radius: 8px; margin-top: 10px;
      font-size: .9rem; font-weight: 500;
    }
    .alert-error { background: #e9456022; color: var(--accent1); border: 1px solid var(--accent1); }
    .alert-success { background: #4caf5022; color: var(--green); border: 1px solid var(--green); }

    /* ---- Private overlay ---- */
    .private-mode-msg {
      background: var(--accent3); border-radius: 8px; padding: 10px 16px;
      text-align: center; font-size: .88rem; margin-bottom: 14px;
    }
    .blur-input input { -webkit-text-security: disc; }

    /* ---- Round badge ---- */
    .round-badge {
      display: inline-block; background: var(--accent1);
      color: #fff; border-radius: 6px; padding: 2px 10px;
      font-size: .8rem; font-weight: 700; margin-left: 8px;
    }

    /* ---- Responsive ---- */
    @media (max-width: 500px) {
      .card { padding: 20px 16px; }
      .digit-input input { width: 50px; height: 50px; font-size: 1.3rem; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<h1>🎲 数字猜猜猜</h1>
<p class="subtitle">双人对战 · 猜出对手的四位数字即获胜</p>

<!-- Phase Bar -->
<div class="phase-bar" id="phaseBar">
  <div class="phase-step active" id="ph0">① 设置秘密数字</div>
  <div class="phase-step" id="ph1">② 骰子决先手</div>
  <div class="phase-step" id="ph2">③ 开始猜数</div>
</div>

<!-- ============ SECTION 0: 设置秘密数字 ============ -->
<div class="section visible" id="sec0">
  <div class="split" style="width:100%;max-width:720px;">
    <div class="card" id="p1SetCard">
      <h2>🔵 玩家 1 设置秘密数字</h2>
      <div class="private-mode-msg" id="p1Hint">请玩家 1 独自查看此屏幕输入数字，完成后交给玩家 2</div>
      <div class="input-group">
        <label>输入你的四位秘密数字（0-9，可重复）</label>
        <div class="digit-input blur-input" id="p1Digits">
          <input type="number" min="0" max="9" maxlength="1" id="p1d0" placeholder="?" />
          <input type="number" min="0" max="9" maxlength="1" id="p1d1" placeholder="?" />
          <input type="number" min="0" max="9" maxlength="1" id="p1d2" placeholder="?" />
          <input type="number" min="0" max="9" maxlength="1" id="p1d3" placeholder="?" />
        </div>
      </div>
      <button class="btn btn-primary" id="p1ConfirmBtn" onclick="confirmSecret(1)">✅ 确认并隐藏</button>
      <div id="p1Alert"></div>
    </div>

    <div class="card" id="p2SetCard">
      <h2>🟠 玩家 2 设置秘密数字</h2>
      <div class="private-mode-msg" id="p2Hint">请玩家 2 独自查看此屏幕输入数字</div>
      <div class="input-group">
        <label>输入你的四位秘密数字（0-9，可重复）</label>
        <div class="digit-input blur-input" id="p2Digits">
          <input type="number" min="0" max="9" maxlength="1" id="p2d0" placeholder="?" />
          <input type="number" min="0" max="9" maxlength="1" id="p2d1" placeholder="?" />
          <input type="number" min="0" max="9" maxlength="1" id="p2d2" placeholder="?" />
          <input type="number" min="0" max="9" maxlength="1" id="p2d3" placeholder="?" />
        </div>
      </div>
      <button class="btn btn-primary" id="p2ConfirmBtn" onclick="confirmSecret(2)">✅ 确认并隐藏</button>
      <div id="p2Alert"></div>
    </div>
  </div>

  <button class="btn btn-gold" id="goToDiceBtn" onclick="goToDice()" style="display:none;margin-top:8px;">
    🎲 前往骰子决先手 →
  </button>
</div>

<!-- ============ SECTION 1: 骰子决先手 ============ -->
<div class="section" id="sec1">
  <div class="card" style="max-width:480px;text-align:center;">
    <h2 style="justify-content:center;">🎲 摇骰子 · 点数大者先手</h2>
    <p style="color:var(--muted);font-size:.9rem;margin-bottom:6px;">平局将自动重摇</p>

    <div class="dice-area">
      <div class="player-dice">
        <div class="name p1-tag">🔵 玩家 1</div>
        <div class="dice" id="dice1" onclick="rollDice()">
          <div class="dot" id="d1_1"></div><div class="dot" id="d1_2"></div><div class="dot" id="d1_3"></div>
          <div class="dot" id="d1_4"></div><div class="dot" id="d1_5"></div><div class="dot" id="d1_6"></div>
          <div class="dot" id="d1_7"></div><div class="dot" id="d1_8"></div><div class="dot" id="d1_9"></div>
          <div class="dice-val" id="dv1">?</div>
        </div>
        <div style="margin-top:8px;font-size:1.5rem;font-weight:900;" id="diceScore1">-</div>
      </div>
      <div class="vs-icon">⚔️</div>
      <div class="player-dice">
        <div class="name p2-tag">🟠 玩家 2</div>
        <div class="dice" id="dice2" onclick="rollDice()">
          <div class="dot" id="d2_1"></div><div class="dot" id="d2_2"></div><div class="dot" id="d2_3"></div>
          <div class="dot" id="d2_4"></div><div class="dot" id="d2_5"></div><div class="dot" id="d2_6"></div>
          <div class="dot" id="d2_7"></div><div class="dot" id="d2_8"></div><div class="dot" id="d2_9"></div>
          <div class="dice-val" id="dv2">?</div>
        </div>
        <div style="margin-top:8px;font-size:1.5rem;font-weight:900;" id="diceScore2">-</div>
      </div>
    </div>

    <div id="diceResult" style="min-height:36px;margin-bottom:16px;font-size:1rem;font-weight:600;color:var(--gold);"></div>
    <button class="btn btn-primary" id="rollBtn" onclick="rollDice()" style="width:100%;font-size:1.1rem;">
      🎲 摇骰子！
    </button>
    <button class="btn btn-gold" id="startGameBtn" onclick="startGame()" style="display:none;width:100%;margin-top:12px;font-size:1.1rem;">
      ⚔️ 开始对战！
    </button>
  </div>
</div>

<!-- ============ SECTION 2: 对战 ============ -->
<div class="section" id="sec2">
  <!-- Turn Banner -->
  <div class="card" style="max-width:720px;padding:16px 24px;">
    <div class="turn-banner" id="turnBanner">轮到 玩家1 猜数</div>

    <!-- Guess Input -->
    <div style="margin-bottom:14px;">
      <label style="font-size:.88rem;color:var(--muted);display:block;margin-bottom:8px;">
        <span id="guesserName">玩家1</span> 请输入你猜测的四位数字：
      </label>
      <div class="digit-input" id="guessDigits" style="gap:10px;margin-bottom:12px;">
        <input type="number" min="0" max="9" maxlength="1" id="gd0" placeholder="?" />
        <input type="number" min="0" max="9" maxlength="1" id="gd1" placeholder="?" />
        <input type="number" min="0" max="9" maxlength="1" id="gd2" placeholder="?" />
        <input type="number" min="0" max="9" maxlength="1" id="gd3" placeholder="?" />
      </div>
      <button class="btn btn-primary" onclick="submitGuess()" id="guessBtn">🔍 提交猜测</button>
      <div id="guessAlert"></div>
    </div>
  </div>

  <!-- Split: P1 History / P2 History -->
  <div class="split" style="width:100%;max-width:720px;">
    <div class="card">
      <h2><span class="p1-tag">🔵 玩家1</span> 的猜测记录 <span class="round-badge" id="p1GuessCount">0</span></h2>
      <div class="history-wrap" id="p1History">
        <div style="text-align:center;color:var(--muted);padding:20px;font-size:.9rem;">暂无记录</div>
      </div>
    </div>
    <div class="card">
      <h2><span class="p2-tag">🟠 玩家2</span> 的猜测记录 <span class="round-badge" id="p2GuessCount">0</span></h2>
      <div class="history-wrap" id="p2History">
        <div style="text-align:center;color:var(--muted);padding:20px;font-size:.9rem;">暂无记录</div>
      </div>
    </div>
  </div>
</div>

<!-- ============ SECTION 3: 胜利 ============ -->
<div class="section" id="sec3">
  <div class="card" style="max-width:480px;">
    <div class="win-screen">
      <div class="win-trophy" id="winTrophy">🏆</div>
      <div class="win-title" id="winTitle">玩家1 获胜！</div>
      <div class="win-sub" id="winSub">成功猜出对方的秘密数字！</div>

      <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:24px;">
        <div class="reveal-box" style="flex:1;min-width:140px;">
          <div class="label">🔵 玩家1 的秘密数字</div>
          <div class="reveal-num" id="revealP1">----</div>
        </div>
        <div class="reveal-box" style="flex:1;min-width:140px;">
          <div class="label">🟠 玩家2 的秘密数字</div>
          <div class="reveal-num" id="revealP2">----</div>
        </div>
      </div>

      <div id="statsBox" style="margin-bottom:24px;color:var(--muted);font-size:.92rem;line-height:1.9;"></div>

      <button class="btn btn-gold" onclick="restart()" style="width:100%;font-size:1.05rem;">
        🔄 再来一局
      </button>
    </div>
  </div>
</div>

<script>
// ==============================
// STATE
// ==============================
const state = {
  secrets: ['', ''],        // ['1234', '5678']
  confirmed: [false, false],
  diceRolls: [0, 0],
  firstPlayer: 0,           // 0 or 1 (index)
  currentTurn: 0,           // player index who is guessing
  round: 1,
  guessHistory: [[], []],   // history per player
  gameOver: false,
};

// ==============================
// UTILITY
// ==============================
function getDigitVal(prefix, idx) {
  const el = document.getElementById(`${prefix}${idx}`);
  return el ? el.value.trim() : '';
}

function readDigits(prefix) {
  const vals = [];
  for (let i = 0; i < 4; i++) vals.push(getDigitVal(prefix, i));
  return vals;
}

function validateDigits(vals) {
  if (vals.some(v => v === '')) return '请填写全部四位数字';
  if (vals.some(v => isNaN(v) || v < 0 || v > 9)) return '每位只能填 0-9 的数字';
  return null;
}

function showAlert(id, msg, type = 'error') {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = msg
    ? `<div class="alert alert-${type}">${msg}</div>`
    : '';
}

function setSection(idx) {
  ['sec0','sec1','sec2','sec3'].forEach((id, i) => {
    document.getElementById(id).classList.toggle('visible', i === idx);
  });
  // phase bar
  ['ph0','ph1','ph2'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.classList.remove('active', 'done');
    if (i < idx) el.classList.add('done');
    if (i === Math.min(idx, 2)) el.classList.add('active');
  });
  // hide phase bar on win
  document.getElementById('phaseBar').style.display = idx === 3 ? 'none' : '';
}

// ==============================
// SECTION 0: SET SECRET
// ==============================
function confirmSecret(player) {
  const pi = player - 1;
  const prefix = `p${player}d`;
  const vals = readDigits(prefix);
  const err = validateDigits(vals);
  if (err) { showAlert(`p${player}Alert`, err, 'error'); return; }

  state.secrets[pi] = vals.join('');
  state.confirmed[pi] = true;

  // Lock inputs
  const digitsDiv = document.getElementById(`p${player}Digits`);
  digitsDiv.querySelectorAll('input').forEach(inp => {
    inp.value = '*';
    inp.disabled = true;
    inp.style.color = 'var(--accent3)';
    inp.style.fontSize = '2rem';
  });
  document.getElementById(`p${player}ConfirmBtn`).disabled = true;
  document.getElementById(`p${player}ConfirmBtn`).textContent = '✅ 已确认锁定';
  showAlert(`p${player}Alert`, `玩家 ${player} 的秘密数字已锁定！`, 'success');
  document.getElementById(`p${player}Hint`).textContent = '数字已锁定，请勿让对方看到';

  // Check if both confirmed
  if (state.confirmed[0] && state.confirmed[1]) {
    document.getElementById('goToDiceBtn').style.display = 'inline-flex';
  }
}

function goToDice() {
  setSection(1);
}

// Digit input auto-jump
document.querySelectorAll('.digit-input input').forEach((inp, _, all) => {
  inp.addEventListener('input', function() {
    this.value = this.value.slice(-1);
    // auto jump to next
    const arr = Array.from(all);
    const idx = arr.indexOf(this);
    if (this.value !== '' && idx < arr.length - 1) {
      arr[idx + 1].focus();
    }
    this.classList.toggle('filled', this.value !== '');
  });
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Backspace' && this.value === '') {
      const arr = Array.from(all);
      const idx = arr.indexOf(this);
      if (idx > 0) arr[idx - 1].focus();
    }
  });
});

// ==============================
// SECTION 1: DICE
// ==============================
// Dice dot patterns for 1-6
const diceDots = {
  1: [5],
  2: [1, 9],
  3: [1, 5, 9],
  4: [1, 3, 7, 9],
  5: [1, 3, 5, 7, 9],
  6: [1, 2, 3, 7, 8, 9],
};

function renderDice(diceId, value) {
  const prefix = diceId === 1 ? 'd1_' : 'd2_';
  for (let i = 1; i <= 9; i++) {
    document.getElementById(`${prefix}${i}`).classList.remove('on');
  }
  const valEl = document.getElementById(`dv${diceId}`);
  valEl.classList.remove('show');
  valEl.textContent = value;
  if (value && diceDots[value]) {
    diceDots[value].forEach(dot => {
      document.getElementById(`${prefix}${dot}`).classList.add('on');
    });
    valEl.classList.add('show');
  }
}

let rollingLock = false;
function rollDice() {
  if (rollingLock) return;
  rollingLock = true;
  document.getElementById('rollBtn').disabled = true;
  document.getElementById('diceResult').textContent = '摇中...';
  document.getElementById('startGameBtn').style.display = 'none';
  document.getElementById('diceScore1').textContent = '-';
  document.getElementById('diceScore2').textContent = '-';

  const dice1El = document.getElementById('dice1');
  const dice2El = document.getElementById('dice2');
  dice1El.classList.add('rolling');
  dice2El.classList.add('rolling');

  // animate random flicker
  let count = 0;
  const flicker = setInterval(() => {
    renderDice(1, Math.ceil(Math.random() * 6));
    renderDice(2, Math.ceil(Math.random() * 6));
    count++;
    if (count > 12) {
      clearInterval(flicker);
      const r1 = Math.ceil(Math.random() * 6);
      const r2 = Math.ceil(Math.random() * 6);
      renderDice(1, r1);
      renderDice(2, r2);
      state.diceRolls = [r1, r2];
      document.getElementById('diceScore1').textContent = r1;
      document.getElementById('diceScore2').textContent = r2;

      setTimeout(() => {
        dice1El.classList.remove('rolling');
        dice2El.classList.remove('rolling');
        evaluateDice(r1, r2);
        rollingLock = false;
      }, 300);
    }
  }, 60);
}

function evaluateDice(r1, r2) {
  const resultEl = document.getElementById('diceResult');
  const rollBtn = document.getElementById('rollBtn');
  const startBtn = document.getElementById('startGameBtn');

  if (r1 === r2) {
    resultEl.textContent = `⚖️ 平局（${r1} vs ${r2}），自动重摇！`;
    rollBtn.disabled = false;
    setTimeout(rollDice, 1200);
  } else if (r1 > r2) {
    resultEl.textContent = `🔵 玩家1 先手！（${r1} > ${r2}）`;
    state.firstPlayer = 0;
    rollBtn.disabled = true;
    startBtn.style.display = 'block';
  } else {
    resultEl.textContent = `🟠 玩家2 先手！（${r2} > ${r1}）`;
    state.firstPlayer = 1;
    rollBtn.disabled = true;
    startBtn.style.display = 'block';
  }
}

function startGame() {
  state.currentTurn = state.firstPlayer;
  state.round = 1;
  state.guessHistory = [[], []];
  updateGameUI();
  setSection(2);
}

// ==============================
// SECTION 2: GAME
// ==============================
function playerName(idx) {
  return idx === 0 ? '玩家1' : '玩家2';
}
function playerClass(idx) {
  return idx === 0 ? 'p1-tag' : 'p2-tag';
}

function updateGameUI() {
  const cur = state.currentTurn;
  const banner = document.getElementById('turnBanner');
  banner.innerHTML = `第 ${state.round} 轮 · 轮到 <span class="${playerClass(cur)}">${playerName(cur)}</span> 猜数`;
  document.getElementById('guesserName').textContent = playerName(cur);

  // clear guess inputs
  ['gd0','gd1','gd2','gd3'].forEach(id => {
    const el = document.getElementById(id);
    el.value = '';
    el.disabled = false;
    el.classList.remove('filled');
  });
  showAlert('guessAlert', '');
  document.getElementById('gd0').focus();
}

function countHits(guess, secret) {
  let count = 0;
  const g = guess.split('');
  const s = secret.split('');

  // Count digits that appear in secret (position-independent, handle duplicates)
  const secretCount = {};
  s.forEach(d => { secretCount[d] = (secretCount[d] || 0) + 1; });
  const guessCount = {};
  g.forEach(d => { guessCount[d] = (guessCount[d] || 0) + 1; });

  for (const digit in guessCount) {
    if (secretCount[digit]) {
      count += Math.min(guessCount[digit], secretCount[digit]);
    }
  }
  return count;
}

function countExact(guess, secret) {
  let count = 0;
  for (let i = 0; i < 4; i++) {
    if (guess[i] === secret[i]) count++;
  }
  return count;
}

function submitGuess() {
  const cur = state.currentTurn;
  const vals = readDigits('gd');
  const err = validateDigits(vals);
  if (err) { showAlert('guessAlert', err, 'error'); return; }

  const guess = vals.join('');
  const target = state.secrets[1 - cur]; // opponent's secret
  const hits = countHits(guess, target);
  const exact = countExact(guess, target);

  // record
  state.guessHistory[cur].push({ guess, hits, exact, round: state.round });

  // update history UI
  renderHistory(cur);

  // check win
  if (guess === target) {
    endGame(cur);
    return;
  }

  // Switch turn
  if (cur !== state.firstPlayer) {
    // Both players have gone this round, increment round
    state.round++;
  }
  state.currentTurn = 1 - cur;
  updateGameUI();
}

function renderHistory(playerIdx) {
  const histDiv = document.getElementById(`p${playerIdx + 1}History`);
  const countEl = document.getElementById(`p${playerIdx + 1}GuessCount`);
  const history = state.guessHistory[playerIdx];
  countEl.textContent = history.length;

  if (history.length === 0) {
    histDiv.innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px;font-size:.9rem;">暂无记录</div>';
    return;
  }

  histDiv.innerHTML = history.map((h, i) => `
    <div class="history-item">
      <span class="round-num">#${i + 1}</span>
      <span class="guess-num">${h.guess.split('').join(' ')}</span>
      <span class="result">
        <span class="hit-num">${h.hits}</span> 个数字猜中<br/>
        <span style="color:var(--accent1);font-weight:700;">${h.exact}</span> 个位置正确
      </span>
    </div>
  `).reverse().join('');
}

// ==============================
// SECTION 3: WIN
// ==============================
function endGame(winnerIdx) {
  state.gameOver = true;
  const p1g = state.guessHistory[0].length;
  const p2g = state.guessHistory[1].length;

  document.getElementById('winTrophy').textContent = winnerIdx === 0 ? '🏆' : '🥇';
  document.getElementById('winTitle').textContent = `${playerName(winnerIdx)} 获胜！`;
  document.getElementById('winSub').textContent = `成功猜出对方的四位秘密数字！`;
  document.getElementById('revealP1').textContent = state.secrets[0].split('').join(' ');
  document.getElementById('revealP2').textContent = state.secrets[1].split('').join(' ');
  document.getElementById('statsBox').innerHTML = `
    🔵 玩家1 共猜了 <strong>${p1g}</strong> 次&nbsp;&nbsp;|&nbsp;&nbsp;
    🟠 玩家2 共猜了 <strong>${p2g}</strong> 次<br/>
    先手为：<strong>${playerName(state.firstPlayer)}</strong>
  `;
  setSection(3);
}

function restart() {
  // reset state
  state.secrets = ['', ''];
  state.confirmed = [false, false];
  state.diceRolls = [0, 0];
  state.firstPlayer = 0;
  state.currentTurn = 0;
  state.round = 1;
  state.guessHistory = [[], []];
  state.gameOver = false;

  // Reset UI
  [1, 2].forEach(p => {
    const pi = p - 1;
    ['d0','d1','d2','d3'].forEach(d => {
      const el = document.getElementById(`p${p}${d}`);
      el.value = '';
      el.disabled = false;
      el.style.color = '';
      el.style.fontSize = '';
      el.classList.remove('filled');
    });
    const btn = document.getElementById(`p${p}ConfirmBtn`);
    btn.disabled = false;
    btn.textContent = '✅ 确认并隐藏';
    showAlert(`p${p}Alert`, '');
    document.getElementById(`p${p}Hint`).textContent = `请玩家 ${p} 独自查看此屏幕输入数字`;
  });

  document.getElementById('goToDiceBtn').style.display = 'none';

  // Reset dice
  renderDice(1, null);
  renderDice(2, null);
  document.getElementById('diceScore1').textContent = '-';
  document.getElementById('diceScore2').textContent = '-';
  document.getElementById('diceResult').textContent = '';
  document.getElementById('rollBtn').disabled = false;
  document.getElementById('startGameBtn').style.display = 'none';

  // Reset histories
  [1, 2].forEach(p => {
    document.getElementById(`p${p}History`).innerHTML =
      '<div style="text-align:center;color:var(--muted);padding:20px;font-size:.9rem;">暂无记录</div>';
    document.getElementById(`p${p}GuessCount`).textContent = '0';
  });

  document.getElementById('phaseBar').style.display = '';
  setSection(0);
}

// ==============================
// INIT
// ==============================
renderDice(1, null);
renderDice(2, null);
</script>
