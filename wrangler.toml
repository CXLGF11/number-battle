name = "number-battle"
main = "dist-worker.js"
compatibility_date = "2024-01-01"
workers_dev = true

# 自定义域名
routes = [
  { pattern = "xlygf11.com", custom_domain = true },
  { pattern = "www.xlygf11.com", custom_domain = true }
]

# Durable Objects 用于持久化游戏房间
[[durable_objects.bindings]]
name = "ROOM"
class_name = "GameRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]
